services:
  # Express Backend Web Service (Double-duties as BullMQ queue dispatcher)
  - type: web
    name: one-janitorial-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: VAULT_ENCRYPTION_KEY
        sync: false
      - key: SOCKET_CORS_ORIGIN
        value: "*"
      - key: REDIS_URL
        fromService:
          type: redis
          name: one-janitorial-redis
          property: connectionString

  # BullMQ Task Queue Dedicated Worker (Optional scale offloader)
  - type: worker
    name: one-janitorial-queue-worker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node src/server.js
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: VAULT_ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: one-janitorial-redis
          property: connectionString

  # Private Redis instance for BullMQ task management
  - type: redis
    name: one-janitorial-redis
    plan: starter
    ipAllowList: [] # empty means only accessible internally via the private network

