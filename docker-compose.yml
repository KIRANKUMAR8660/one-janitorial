version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: staff-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: staff-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: staff-backend
    restart: always
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/one_janitorial
      - JWT_SECRET=supersecret_jwt_access_key_12345!
      - JWT_REFRESH_SECRET=supersecret_jwt_refresh_key_12345!
      - REDIS_URL=redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: staff-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx-proxy:
    image: nginx:alpine
    container_name: staff-nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: staff-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: staff-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  mongo-data:
